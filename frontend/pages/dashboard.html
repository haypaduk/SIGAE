<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SIGAE</title>
    
    <!-- CSS Global -->
    <link rel="stylesheet" href="/css/main.css">
    
    <!-- CSS específico del dashboard -->
    <link rel="stylesheet" href="/css/dashboard.css">
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="dashboard-wrapper">
        
        <!-- ============================================= -->
        <!-- TOP BAR (con logos)                           -->
        <!-- ============================================= -->
        <div class="top-bar">
            <div class="top-bar-left">
                <!-- Logos -->
                <div class="top-bar-logos">
                    <img src="/frontend/img/rectoria_cortada.jpg" alt="Logo UTVT" class="logo">
                    <span class="separator"></span>
                    <img src="/frontend/img/utvt_logo.jpg" alt="Logo SIGAE" class="logo">
                </div>
                
                <!-- Texto -->
                <div class="top-bar-text">
                    <div class="titulo">UTVT · SISTEMA DE GESTIÓN</div>
                    <div class="subtitulo">SIGAE</div>
                </div>
            </div>
            
            <div class="top-bar-right">
                <div class="notifications" id="notifications">
                    <i class="fas fa-bell"></i>
                    <span class="notifications-badge" id="notif-count">0</span>
                </div>
                <div class="user-info">
                    <div class="user-avatar" id="user-avatar">A</div>
                    <div class="user-name" id="user-name">Cargando...</div>
                </div>
            </div>
        </div>
        <!-- ===== FIN TOP BAR ===== -->

        <!-- ============================================= -->
        <!-- SIDEBAR + CONTENIDO                           -->
        <!-- ============================================= -->
        <div class="dashboard-body">
            
            <!-- Sidebar -->
            <div class="sidebar">
                <div class="sidebar-header">
                    <h2><i class="fas fa-cubes"></i> SIGAE</h2>
                    <p><i class="fas fa-door-open"></i> Gestión de Aulas</p>
                </div>
                <ul class="sidebar-menu">
                    <li><a href="/dashboard"><i class="fas fa-chart-pie"></i> Dashboard</a></li>
                    <li><a href="/infraestructura"><i class="fas fa-building"></i> Infraestructura</a></li>
                    <li><a href="/solicitudes"><i class="fas fa-file-alt"></i> Solicitudes</a></li>
                    <li><a href="/reportes"><i class="fas fa-chart-bar"></i> Reportes</a></li>
                    <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a></li>
                </ul>
            </div>

            <!-- Contenido -->
            <div class="main-content">
                <div class="content">
                    
                    <!-- ============================================= -->
                    <!-- TARJETAS DE ESTADÍSTICAS (se genera con JS)   -->
                    <!-- ============================================= -->
                    <div class="stats-grid" id="stats-grid">
                        <div class="stat-card">Cargando estadísticas...</div>
                    </div>

                    <!-- ============================================= -->
                    <!-- OCUPACIÓN POR EDIFICIO (barras)               -->
                    <!-- ============================================= -->
                    <div class="ocupacion-container">
                        <div class="ocupacion-card">
                            <h3><i class="fas fa-building"></i> Ocupación por Edificio</h3>
                            <div id="ocupacion-edificios">
                                <p>Cargando...</p>
                            </div>
                        </div>
                        <!-- 
                            =============================================
                            NOTA: La tarjeta de "Ocupación Global" 
                            se genera DENTRO de #stats-grid desde 
                            JavaScript (dashboard.js).
                            NO la pongas aquí para evitar duplicidad.
                            =============================================
                        -->
                    </div>

                    <!-- ============================================= -->
                    <!-- LISTAS DE AULAS                               -->
                    <!-- ============================================= -->
                    <div class="lists-container">
                        <div class="list-card">
                            <h3><i class="fas fa-fire"></i> Alta Demanda</h3>
                            <div id="alta-demanda-list">
                                <p>Cargando...</p>
                            </div>
                        </div>
                        <div class="list-card">
                            <h3><i class="fas fa-exclamation-triangle"></i> Espacios Subutilizados</h3>
                            <div id="subutilizadas-list">
                                <p>Cargando...</p>
                            </div>
                        </div>
                    </div>

                </div> <!-- .content -->
            </div> <!-- .main-content -->

        </div> <!-- .dashboard-body -->

    </div> <!-- .dashboard-wrapper -->

    <!-- ============================================= -->
    <!-- JAVASCRIPT                                    -->
    <!-- ============================================= -->
    <!-- Funciones globales (logout, mostrarUsuario) -->
    <script src="/js/main.js"></script>
    
    <!-- Lógica específica del dashboard -->
    <script src="/js/dashboard.js"></script>
</body>
</html>
