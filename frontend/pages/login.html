<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SIGAE</title>
    
    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- CSS Global -->
    <link rel="stylesheet" href="/css/main.css">
    
    <!-- CSS específico de login -->
    <link rel="stylesheet" href="/css/login.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <!-- ============================================= -->
            <!-- ENCABEZADO CON LOGO                           -->
            <!-- ============================================= -->
            <div class="login-header">
                <div class="logo-container">
                    <div class="logo-wrapper">
                        <img src="/img/cuervo.jpg" alt="Logo UTVT" class="logo-img">
                    </div>
                </div>
                <h1>SIGAE</h1>
                <p>Sistema Integral de Gestión Académica y Escolar</p>
            </div>
            
            <!-- ============================================= -->
            <!-- ALERTAS                                       -->
            <!-- ============================================= -->
            <div id="alert-container"></div>
            
            <!-- ============================================= -->
            <!-- FORMULARIO                                   -->
            <!-- ============================================= -->
            <form id="loginForm" novalidate>
                <!-- Campo Email -->
                <div class="form-group">
                    <label for="email">Correo Institucional <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <div class="input-icon">
                            <i class="fas fa-envelope"></i>
                        </div>
                        <input 
                            type="email" 
                            id="email" 
                            placeholder="ejemplo@utvtol.edu.mx"
                            required
                            autofocus
                        >
                        <div class="input-validation" id="emailValidation"></div>
                    </div>
                    <div class="error-message" id="emailError"></div>
                </div>
                
                <!-- Campo Password -->
                <div class="form-group">
                    <label for="password">Contraseña <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <div class="input-icon">
                            <i class="fas fa-lock"></i>
                        </div>
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="Mínimo 6 caracteres"
                            required
                            minlength="6"
                        >
                        <button type="button" class="toggle-password" id="togglePassword" aria-label="Mostrar contraseña">
                            <i class="fas fa-eye" id="passwordIcon"></i>
                        </button>
                        
                    </div>
                    <div class="error-message" id="passwordError"></div>
                    
                    <!-- Indicador de fuerza de contraseña -->
                    <div class="password-strength" id="passwordStrength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                        <span class="strength-text" id="strengthText">Débil</span>
                    </div>
                </div>
                
                <!-- Botón de Login -->
                <button type="submit" class="btn-login" id="loginBtn">
                    <span class="btn-text">Ingresar al Sistema</span>
                    <span class="btn-loader" id="btnLoader" style="display: none;">
                        <i class="fas fa-spinner fa-spin"></i> Validando credenciales...
                    </span>
                </button>
            </form>
            
            <!-- ============================================= -->
            <!-- FOOTER                                       -->
            <!-- ============================================= -->
            <div class="login-footer">
                <a href="#" id="forgotLink" onclick="openForgotModal(); return false;">¿Olvidaste tu contraseña?</a>
            </div>
            
            <!-- Separador -->
            <div class="login-divider">
                <span>¿No tienes cuenta?</span>
            </div>
            <p class="login-help">Contacta al departamento de sistemas</p>
        </div>
        
        <!-- Copyright -->
        <div class="login-copyright">
            &copy; <span id="currentYear"></span> UTVT - Todos los derechos reservados
        </div>
    </div>

    <!-- ============================================= -->
    <!-- MODAL "OLVIDÓ CONTRASEÑA"                     -->
    <!-- ============================================= -->
    <div id="forgotModal">
        <div class="modal-content">
            <div class="modal-icon">
                <i class="fas fa-key"></i>
            </div>
            <h3>¿Olvidaste tu contraseña?</h3>
            <p>Para restablecer tu contraseña, contacta al administrador:</p>
            <p class="email-admin">
                <i class="fas fa-envelope"></i> admin@utvtol.edu.mx
            </p>
            <button class="btn-modal" onclick="closeForgotModal()">Cerrar</button>
        </div>
    </div>

    <!-- ============================================= -->
    <!-- JAVASCRIPT                                    -->
    <!-- ============================================= -->
    <script src="/js/login.js"></script>
</body>
</html>
