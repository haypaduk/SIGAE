<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SIGAE</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>SIGAE</h1>
                <p>Sistema de Gestión de Aulas y Espacios</p>
                <p class="subtitle">UTVT</p>
            </div>
            
            <div id="alert-container"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="usuario@utvtol.edu.mx" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                
                <div class="form-group checkbox">
                    <label>
                        <input type="checkbox" name="remember" id="remember"> Mantener la sesión iniciada
                    </label>
                </div>
                
                <button type="submit" class="btn-login">Iniciar Sesión</button>
            </form>
            
            <div class="login-footer">
                <a href="#">¿Olvidó su contraseña?</a>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Validar dominio del correo
            if (!email.endsWith('@utvtol.edu.mx')) {
                showAlert('Solo se aceptan correos @utvtol.edu.mx', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showAlert('Inicio de sesión exitoso', 'success');
                    
                    // Guardar datos del usuario (sin token por ahora)
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    // Redirigir al dashboard usando loadPage
                    setTimeout(() => {
                        if (typeof loadPage === 'function') {
                            loadPage('/dashboard');
                        } else {
                            window.location.href = '/dashboard';
                        }
                    }, 1000);
                } else {
                    showAlert(data.error || 'Credenciales inválidas', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('Error de conexión con el servidor', 'error');
            }
        });
        
        function showAlert(message, type) {
            const alertContainer = document.getElementById('alert-container');
            if (!alertContainer) return;
            
            alertContainer.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => {
                alertContainer.innerHTML = '';
            }, 3000);
        }
    </script>
</body>
</html>
