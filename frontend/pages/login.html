<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SIGAE</title>
    
    <!-- CSS Global -->
    <link rel="stylesheet" href="/css/main.css">
    
    <!-- CSS específico de login -->
    <link rel="stylesheet" href="/css/login.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <!-- Encabezado -->
            <div class="login-header">
                <h1>SIGAE</h1>
                <p>Sistema de Gestión de Aulas y Espacios</p>
                <p class="subtitle">UTVT</p>
            </div>
            
            <!-- Alertas -->
            <div id="alert-container"></div>
            
            <!-- Formulario -->
            <form id="loginForm" onsubmit="return false;">
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="usuario@utvtol.edu.mx" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn-login" id="loginBtn">Iniciar Sesión</button>
            </form>
            
            <!-- Footer -->
            <div class="login-footer">
                <a href="#" onclick="openForgotModal(); return false;">¿Olvidó su contraseña?</a>
            </div>
        </div>
    </div>

    <!-- ============================================= -->
    <!-- MODAL "OLVIDÓ CONTRASEÑA"                     -->
    <!-- ============================================= -->
    <div id="forgotModal">
        <div class="modal-content">
            <h3>🔐 ¿Olvidaste tu contraseña?</h3>
            <p>Para restablecer tu contraseña, contacta al administrador:</p>
            <p class="email-admin">📧 admin@utvtol.edu.mx</p>
            <button class="btn-modal" onclick="closeForgotModal()">Cerrar</button>
        </div>
    </div>

    <!-- ============================================= -->
    <!-- JAVASCRIPT                                    -->
    <!-- ============================================= -->
    <!-- Lógica específica de login -->
    <script src="/js/login.js"></script>
</body>
</html>
