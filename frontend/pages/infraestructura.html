<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infraestructura - SIGAE</title>
    
    <!-- CSS Global -->
    <link rel="stylesheet" href="/css/main.css">
    
    <!-- CSS específico de infraestructura -->
    <link rel="stylesheet" href="/css/infraestructura.css">

    <!-- CSS de administración (para modales) -->
    <link rel="stylesheet" href="/css/admin.css">
    
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>
    <div class="dashboard-wrapper">
        
        <!-- ============================================= -->
        <!-- TOP BAR (con logos)                           -->
        <!-- ============================================= -->
        <div class="top-bar">
            <div class="top-bar-left">
                <!-- Logos -->
                <div class="top-bar-logos">
                    <img src="/frontend/img/rectoria_cortada.jpg" alt="Logo UTVT" class="logo">
                    <span class="separator"></span>
                    <img src="/frontend/img/utvt_logo.jpg" alt="Logo SIGAE" class="logo">
                </div>
                
                <!-- Texto -->
                <div class="top-bar-text">
                    <div class="titulo">UTVT · SISTEMA DE GESTIÓN</div>
                    <div class="subtitulo">SIGAE</div>
                </div>
            </div>
            
            <div class="top-bar-right">
                <div class="notifications" id="notifications">
                    <i class="fas fa-bell"></i>
                    <span class="notifications-badge" id="notif-count">0</span>
                </div>
                <div class="user-info">
                    <div class="user-avatar" id="user-avatar">A</div>
                    <div class="user-name" id="user-name">Cargando...</div>
                </div>
            </div>
        </div>
        <!-- ===== FIN TOP BAR ===== -->

        <!-- ============================================= -->
        <!-- SIDEBAR + CONTENIDO                           -->
        <!-- ============================================= -->
        <div class="dashboard-body">
            <!-- Sidebar -->
            <div class="sidebar">
                <div class="sidebar-header">
                    <h2>SIGAE</h2>
                    <p>Gestión de Aulas</p>
                </div>
                <ul class="sidebar-menu">
                    <li><a href="/dashboard"><i class="fas fa-chart-pie"></i> Dashboard</a></li>
                    <li><a href="/infraestructura"><i class="fas fa-building"></i> Infraestructura</a></li>
                    <li><a href="/solicitudes"><i class="fas fa-file-alt"></i> Solicitudes</a></li>
                    <li><a href="/reportes"><i class="fas fa-chart-bar"></i> Reportes</a></li>
                    <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a></li>
                </ul>
            </div>

            <!-- Contenido -->
            <div class="main-content">
                <div class="content">
                    <h2>🏢 Edificios</h2>
                    <div id="edificios-container">
                        <p>Cargando edificios...</p>
                    </div>
                    
                    <div id="aulas-container" style="margin-top: 30px;">
                        <!-- Las aulas se muestran aquí al seleccionar un edificio -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================= -->
    <!-- MODAL DE HORARIO                             -->
    <!-- ============================================= -->
    <div class="modal" id="horarioModal">
        <div class="modal-content" style="max-width: 950px; max-height: 90vh; overflow-y: auto; padding: 25px 30px;">
            <h3 id="horario-titulo" style="margin-bottom: 15px; color: #333; font-size: 1.4rem;">
                <i class="fas fa-calendar-alt" style="color: #8B1C2A;"></i> Horario
            </h3>
            <div id="horario-container">
                <p>Cargando horario...</p>
            </div>
            <div style="margin-top: 20px; display: flex; justify-content: flex-end;">
                <button class="btn-secondary" onclick="cerrarHorarioModal()" style="padding: 10px 25px;">
                    <i class="fas fa-times"></i> Cerrar
                </button>
            </div>
        </div>
    </div>

    <!-- ============================================= -->
    <!-- MODAL CREAR/EDITAR RESERVA                    -->
    <!-- ============================================= -->
    <div class="modal" id="reservaModal">
        <div class="modal-content compact" style="max-width: 500px; padding: 22px 25px;">
            <h3 id="modal-title" style="margin-bottom: 15px; color: #333; font-size: 1.2rem;">
                <i class="fas fa-plus-circle" style="color: #8B1C2A;"></i> Nueva Reserva
            </h3>
            <form id="reservaForm">
                <input type="hidden" id="reserva-id">
                <div class="form-group">
                    <label for="reserva-dia">Día</label>
                    <select id="reserva-dia" required>
                        <option value="">Seleccionar día</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="reserva-bloque">Bloque horario</label>
                    <select id="reserva-bloque" required>
                        <option value="">Seleccionar bloque</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="reserva-materia">Materia</label>
                    <select id="reserva-materia" required>
                        <option value="">Seleccionar materia</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="reserva-profesor">Profesor</label>
                    <select id="reserva-profesor" required>
                        <option value="">Seleccionar profesor</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="reserva-grupo">Grupo</label>
                    <input type="text" id="reserva-grupo" placeholder="Ej: ISC-01" required>
                </div>
                <div class="form-group">
                    <label for="reserva-fecha">Fecha de asignación</label>
                    <input type="date" id="reserva-fecha" required>
                </div>
                <div class="modal-actions" style="margin-top: 15px; display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" class="btn-secondary" onclick="cerrarModal()" style="padding: 8px 20px;">Cancelar</button>
                    <button type="submit" class="btn-primary" style="padding: 8px 20px;">
                        <i class="fas fa-save"></i> Guardar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- ============================================= -->
    <!-- JAVASCRIPT                                    -->
    <!-- ============================================= -->
    <script src="/frontend/js/main.js"></script>
    <script src="/frontend/js/infraestructura.js"></script>
    <script src="/frontend/js/admin/utils.js"></script>
    <script src="/frontend/js/reservas.js"></script>
</body>
</html>
